<text x="468" y="141" font-size="7.5" fill="#334">Fires on each new Claude session.</text>
<text x="468" y="153" font-size="7.5" fill="#334">1. Check ~/.tinstar/bin/tinstar exists</text>
<text x="468" y="165" font-size="7.5" fill="#334">2. If absent → download from GitHub Releases</text>
<text x="468" y="177" font-size="7.5" fill="#334">3. Verify SHA256 against checksums.txt</text>
<text x="468" y="189" font-size="7.5" fill="#334">4. Fallback: cargo build (if Rust installed)</text>
<text x="468" y="200" font-size="7.5" fill="#888" font-style="italic">Always exits 0 — never blocks session start.</text>

<!-- ── POST-TOOL-USE ── -->
<text x="463" y="224" font-size="7.5" font-weight="700" fill="#3860B0" letter-spacing="1">
  ③ POST-TOOL-USE (ASYNC LEAK TRACKING)
</text>
<rect x="460" y="228" width="208" height="118" rx="3"
      fill="#EEF2FA" stroke="#3860B0" stroke-width="1"/>
<text x="468" y="241" font-size="7.5" fill="#334">Fires after every Bash command completes.</text>

<text x="468" y="255" font-size="7" fill="#888">Only proceeds if:</text>
<text x="476" y="265" font-size="7.5" fill="#334">• command exit code = 0</text>
<text x="476" y="275" font-size="7.5" fill="#334">• command is a git command</text>

<text x="468" y="289" font-size="7.5" fill="#334">tinstar check --command "…"</text>
<text x="468" y="300" font-size="7" fill="#888">If violation found post-execution:</text>
<text x="476" y="310" font-size="7.5" fill="#334">tinstar issue create</text>
<text x="476" y="321" font-size="7.5" fill="#334">→ UUID file in ~/.tinstar/issues/</text>
<text x="476" y="332" font-size="7.5" fill="#334">→ records rule, cmd, branch, dirty flag</text>
<text x="468" y="342" font-size="7.5" fill="#888" font-style="italic">Always exits 0 — never interrupts workflow.</text>
